# ── Información de la Aplicación ──────────────────────────────
spring.application.name=motor-rutinas

# ── Configuración de Base de Datos (Modo Archivo) ──────────────
# Guarda los datos en el archivo "datos_progen" en la carpeta del proyecto
spring.datasource.url=jdbc:h2:file:./datos_progen
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── Consola H2 (Para ver tus tablas en el navegador) ──────────
# Entra en: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Necesario para que la consola H2 funcione con Spring Security
spring.h2.console.settings.web-allow-others=true

# ── Configuración de JPA / Hibernate ──────────────────────────
# "update" crea o actualiza las tablas automáticamente sin borrar los datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── SEGURIDAD JWT (¡CRUCIAL!) ─────────────────────────────────
